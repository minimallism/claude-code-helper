<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Config Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            color: #4ec9b0;
            margin-bottom: 10px;
        }

        h2 {
            color: #4ec9b0;
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-path {
            background: #252526;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-family: Monaco, monospace;
            font-size: 12px;
            color: #858585;
        }

        .top-controls {
            background: #252526;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3e3e42;
        }

        .tab {
            padding: 12px 24px;
            background: #252526;
            border: none;
            color: #858585;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s;
            font-size: 14px;
        }

        .tab:hover {
            background: #2d2d30;
            color: #d4d4d4;
        }

        .tab.active {
            background: #1e1e1e;
            color: #4ec9b0;
            border-bottom: 2px solid #4ec9b0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section {
            background: #252526;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3e3e42;
        }

        .badge {
            background: #0e639c;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #1177bb;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        button.danger {
            background: #c5302d;
        }

        button.danger:hover:not(:disabled) {
            background: #e03e3a;
        }

        button.success {
            background: #107c10;
        }

        button.success:hover:not(:disabled) {
            background: #13a813;
        }

        button.primary {
            background: #0e8c8c;
        }

        button.primary:hover:not(:disabled) {
            background: #10a5a5;
        }

        button.muted {
            background: #4a5568;
        }

        button.muted:hover:not(:disabled) {
            background: #5a6b80;
        }

        button.warn {
            background: #7b3fa3;
        }

        button.warn:hover:not(:disabled) {
            background: #9240c7;
        }

        button.small {
            padding: 6px 12px;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #2d2d30;
        }

        th {
            text-align: left;
            padding: 12px;
            font-weight: 600;
            color: #4ec9b0;
            border-bottom: 1px solid #3e3e42;
            cursor: pointer;
            user-select: none;
        }

        tbody tr {
            border-bottom: 1px solid #3e3e42;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #2d2d30;
            cursor: pointer;
        }

        tbody tr.selected {
            background: #264f78;
        }

        td {
            padding: 12px;
        }

        .size-bar {
            height: 20px;
            background: #3e3e42;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .size-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #107c10, #4ec9b0);
            transition: width 0.3s;
        }

        .size-text {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: #d4d4d4;
            font-weight: bold;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #d4d4d4;
            border-radius: 4px;
            font-size: 14px;
        }

        .mcp-server-card {
            background: #2d2d30;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .mcp-server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .mcp-server-name {
            font-size: 16px;
            font-weight: bold;
            color: #4ec9b0;
        }

        .mcp-server-info {
            font-family: Monaco, monospace;
            font-size: 12px;
            color: #858585;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .json-viewer {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            font-family: Monaco, monospace;
            font-size: 12px;
            color: #d4d4d4;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;  /* 保留换行和缩进 */
            word-break: break-word;
            line-height: 1.6;
        }
        .json-key    { color: #9cdcfe; }   /* 键名：浅蓝 */
        .json-string { color: #ce9178; }   /* 字符串：橘 */
        .json-number { color: #b5cea8; }   /* 数字：浅绿 */
        .json-boolean{ color: #569cd6; }   /* 布尔：蓝 */
        .json-null   { color: #808080; }   /* null：灰色 */

        .warning {
            background: #5a4120;
            border-left: 4px solid #ffd700;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .success-message {
            background: #1a3d1a;
            border-left: 4px solid #13a813;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #2d2d30;
            padding: 15px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #858585;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4ec9b0;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #858585;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Claude Config Editor</h1>
        <p style="color: #858585; margin-bottom: 20px;">基于 Web 的 Claude Code 配置编辑器</p>

        <div class="config-path">
            📁 配置文件: <span id="config-path">加载中...</span>
        </div>

        <div class="top-controls">
            <button class="success" onclick="saveConfig()" id="save-btn" disabled>💾 保存</button>
            <button onclick="reloadConfig()">🔄 刷新</button>
            <button onclick="createBackup()">📦 备份</button>
            <div style="flex: 1;"></div>
            <div style="color: #858585; font-size: 12px;">
                上次保存: <span id="last-save">暂无</span>
            </div>
        </div>

        <div id="message-area"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('overview')">📊 概览</button>
            <button class="tab" onclick="switchTab('projects')">📁 项目历史</button>
            <button class="tab" onclick="switchTab('mcp')">📡 MCP 服务器</button>
            <button class="tab" onclick="switchTab('raw')">📝 原始 JSON</button>
        </div>

        <!-- 概览标签页 -->
        <div id="tab-overview" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">配置大小</div>
                    <div class="stat-value" id="overview-size">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">项目数量</div>
                    <div class="stat-value" id="overview-projects">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">MCP 服务器</div>
                    <div class="stat-value" id="overview-mcp">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">累计启动次数</div>
                    <div class="stat-value" id="overview-startups">-</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2>🔍 快速分析</h2>
                </div>
                <div id="quick-analysis"></div>
            </div>
        </div>

        <!-- 项目标签页 -->
        <div id="tab-projects" class="tab-content">
            <div class="section">
                <div class="section-header">
                    <h2>📁 项目历史 <span class="badge" id="projects-badge">0</span></h2>
                    <div>
                        <button class="primary" onclick="selectAllProjects()">全选</button>
                        <button class="muted" onclick="deselectAllProjects()">取消全选</button>
                        <button class="warn" onclick="selectLargestProjects()">最大的 10 个</button>
                        <button class="danger" onclick="deleteSelectedProjects()">删除选中</button>
                    </div>
                </div>
                <div class="search-box" style="margin-bottom: 15px;">
                    <input type="text" id="projects-search" placeholder="搜索项目..." onkeyup="filterProjects()">
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 50px;">
                                    <input type="checkbox" id="select-all-projects" onchange="toggleAllProjects(this.checked)">
                                </th>
                                <th onclick="sortProjects('path')">项目路径 ↕</th>
                                <th style="width: 100px;" onclick="sortProjects('lastStartTime')">最近启动 ↕</th>
                                <th style="width: 300px;" onclick="sortProjects('size')">大小 ↕</th>
                                <th style="width: 150px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="projects-body">
                            <tr><td colspan="5" class="no-data">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- MCP服务器标签页 -->
        <div id="tab-mcp" class="tab-content">
            <div class="section">
                <div class="section-header">
                    <h2>🛜 MCP 服务器<span class="badge" id="mcp-badge">0</span></h2>
                    <button onclick="addMcpServer()">+ 添加服务器</button>
                </div>
                <div id="mcp-servers-list"></div>
            </div>
        </div>

        <!-- 原始JSON标签页 -->
        <div id="tab-raw" class="tab-content">
            <div class="section">
                <div class="section-header">
                    <h2>📝 原始 JSON</h2>
                    <button onclick="copyRawJson()">📋 复制到剪贴板</button>
                </div>
                <div class="json-viewer" id="raw-json"></div>
            </div>
        </div>
    </div>

    <script>
        let config = null;
        let projectSizes = {};
        let projects = [];
        let sortColumn = 'size';
        let sortDirection = 'desc';
        let hasChanges = false;

        loadConfig();

        // 从服务器获取 Claude Code 配置文件，解析后渲染所有页签
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();

                if (!response.ok || !data.config) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }

                document.getElementById('config-path').textContent = data.path;
                config = data.config;
                projectSizes = data.project_sizes;

                processConfig();
                renderAllTabs();
            } catch (error) {
                showMessage('配置加载失败：' + error.message, 'error');
            }
        }

        // 解析配置中的项目列表，提取每个项目的路径、大小、最近启动时间等信息
        function processConfig() {
            projects = [];

            if (config.projects) {
                for (const [path, data] of Object.entries(config.projects)) {
                    projects.push({
                        path: path,
                        data: data,
                        lastStartTime: data.lastStartTime || 0,
                        size: (projectSizes[path] || 0) + JSON.stringify(data, null, 2).length,
                        selected: false
                    });
                }
            }
        }

        // 刷新所有页签：概览、项目列表、MCP 服务器、原始 JSON
        function renderAllTabs() {
            renderOverview();
            renderProjects();
            renderMcpServers();
            renderRawJson();
        }

        // 渲染概览页签：配置文件总大小、项目数、MCP 数、启动次数、健康分析
        function renderOverview() {
            const totalSize = JSON.stringify(config, null, 2).length;
            const projectsCount = config.projects ? Object.keys(config.projects).length : 0;
            const mcpCount = config.mcpServers ? Object.keys(config.mcpServers).length : 0;

            document.getElementById('overview-size').textContent = formatSize(totalSize);
            document.getElementById('overview-projects').textContent = projectsCount;
            document.getElementById('overview-mcp').textContent = mcpCount;
            document.getElementById('overview-startups').textContent = config.numStartups || 0;

            let analysis = '<div style="color: #858585;">';

            if (totalSize > 5 * 1024 * 1024) {
                analysis += '⚠️ 配置过大 (' + formatSize(totalSize) + ')。建议清理旧的项目历史记录。<br><br>';
            }

            if (projectsCount > 10) {
                analysis += '📁 项目较多 (' + projectsCount + ')。请在"项目历史"标签页中清理不用的项目。<br><br>';
            }

            if (mcpCount === 0) {
                analysis += '🛜 未配置 MCP 服务器。<br><br>';
            } else {
                analysis += '✅ ' + mcpCount + ' 个 MCP 服务器运行中。<br><br>';
            }

            if (totalSize < 5 * 1024 * 1024 && projectsCount <= 10) {
                analysis = '<div style="color: #4ec9b0;">✅ 配置状态健康！</div>';
            }

            document.getElementById('quick-analysis').innerHTML = analysis;
        }

        // 渲染项目列表：搜索过滤、排序、比例条形图
        function renderProjects() {
            const tbody = document.getElementById('projects-body');
            const searchTerm = document.getElementById('projects-search').value.toLowerCase();

            document.getElementById('projects-badge').textContent = projects.length;

            if (projects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-data">暂无项目</td></tr>';
                return;
            }

            const compare = {
                'path': (a, b) => a.path.localeCompare(b.path),
                'lastStartTime': (a, b) => a.lastStartTime - b.lastStartTime,
                'size': (a, b) => a.size - b.size
            };

            const sorted = [...projects].sort((a, b) => {
                const result = compare[sortColumn](a, b);
                return sortDirection === 'asc' ? result : -result;
            });
           
            const filtered = searchTerm
                ? sorted.filter(p => p.path.toLowerCase().includes(searchTerm))
                : sorted;

            const maxSize = Math.max(...projects.map(p => p.size));

            tbody.innerHTML = filtered.map(project => {
                const percentage = (project.size / maxSize) * 100;

                return `
                    <tr class="${project.selected ? 'selected' : ''}" onclick="toggleProject('${escapeHtml(project.path)}')">
                        <td>
                            <input type="checkbox" ${project.selected ? 'checked' : ''}
                                   onclick="event.stopPropagation(); toggleProject('${escapeHtml(project.path)}')">
                        </td>
                        <td style="font-family: 'Monaco', monospace; font-size: 12px;">
                            ${escapeHtml(project.path)}
                        </td>
                        <td style="text-align: center; color: #858585;">
                            ${project.lastStartTime ? new Date(project.lastStartTime).toLocaleString() : '-'}
                        </td>
                        <td>
                            <div class="size-bar">
                                <div class="size-bar-fill" style="width: ${percentage}%"></div>
                                <span class="size-text">${formatSize(project.size)}</span>
                            </div>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <button class="small" onclick="event.stopPropagation(); exportProjectHistory('${escapeHtml(project.path)}')">
                                    💾 导出
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 渲染 MCP 服务器列表：展示名称、Command、Args
        function renderMcpServers() {
            const container = document.getElementById('mcp-servers-list');
            const mcpServers = config.mcpServers || {};
            const serverNames = Object.keys(mcpServers);

            document.getElementById('mcp-badge').textContent = serverNames.length;

            if (serverNames.length === 0) {
                container.innerHTML = '<div class="no-data">未配置 MCP 服务器</div>';
                return;
            }

            container.innerHTML = serverNames.map(name => {
                const server = mcpServers[name];

                return `
                    <div class="mcp-server-card">
                        <div class="mcp-server-header">
                            <div class="mcp-server-name">🛜 ${escapeHtml(name)}</div>
                            <button class="danger small" onclick="deleteMcpServer('${escapeHtml(name)}')">删除</button>
                        </div>
                        <div class="mcp-server-info">
                            ${server.command ? '<div><strong>Command:</strong> ' + escapeHtml(server.command) + '</div>' : ''}
                            ${server.args ? '<div><strong>Args:</strong> ' + JSON.stringify(server.args) + '</div>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染原始 JSON 视图：带缩进格式化显示当前 config 对象，方便快速查看完整配置
        function renderRawJson() {
            const container = document.getElementById('raw-json');
            const json = JSON.stringify(config, null, 2);
            container.innerHTML = syntaxHighlightJson(json);
        }

        // JSON 语法高亮：键名青色、字符串橘色、数字浅绿、布尔蓝、null 灰色
        function syntaxHighlightJson(json) {
            // 先转义 HTML 特殊字符，防止注入
            json = json
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 匹配：字符串(含其后可选的冒号)、布尔/null、数字 三类 token
            const tokenRegex = /("(?:\\.|[^"\\])*")(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?/g;

            return json.replace(tokenRegex, (match, str, colon, keyword) => {
                if (str) {
                    // 字符串：后面紧跟冒号说明是键名，否则是值
                    return colon
                        ? `<span class="json-key">${str}</span>${colon}`
                        : `<span class="json-string">${str}</span>`;
                }
                if (keyword) {
                    const cls = keyword === 'null' ? 'json-null' : 'json-boolean';
                    return `<span class="${cls}">${keyword}</span>`;
                }
                return `<span class="json-number">${match}</span>`;  // 数字
            });
        }

        // 字节数转可读格式：< 1KB 显示 B，< 1MB 显示 KB，>= 1MB 显示 MB
        function formatSize(bytes) {
            if (bytes < 1024) {
                return bytes + ' B';
            }
            if (bytes < 1024 * 1024) {
                return (bytes / 1024).toFixed(1) + ' KB';
            }
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        // HTML 转义，防止路径中的 <>&"' 被浏览器解析为 HTML 标签
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 切换标签页：取消所有 tab/tab-content 的 active，再激活当前选中的
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        // 切换项目选中状态（勾选/取消勾选），用于批量删除
        function toggleProject(path) {
            const project = projects.find(p => p.path === path);
            if (project) {
                project.selected = !project.selected;
                renderProjects();
            }
        }

        // 全选/取消全选：仅操作当前搜索过滤后的项目列表
        function toggleAllProjects(checked) {
            const searchTerm = document.getElementById('projects-search').value.toLowerCase();
            const filtered = searchTerm
                ? projects.filter(p => p.path.toLowerCase().includes(searchTerm))
                : projects;

            filtered.forEach(p => p.selected = checked);
            renderProjects();
        }

        // 全选：同步"全选"checkbox 为勾选状态，再批量选中所有项目
        function selectAllProjects() {
            document.getElementById('select-all-projects').checked = true;
            toggleAllProjects(true);
        }

        // 取消全选：同步"全选"checkbox 为未勾选，再批量取消所有项目
        function deselectAllProjects() {
            document.getElementById('select-all-projects').checked = false;
            toggleAllProjects(false);
        }

        // 快速选中体积最大的前 10 个项目（按 size 降序），方便批量清理
        function selectLargestProjects() {
            deselectAllProjects();
            const sorted = [...projects].sort((a, b) => b.size - a.size);
            sorted.slice(0, 10).forEach(p => p.selected = true);
            renderProjects();  // 程序批量改 selected，需重绘同步 checkbox 和行高亮
        }

        // 表头点击排序：同列翻转，不同列默认降序
        function sortProjects(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'desc';
            }
            renderProjects();
        }

        // 搜索框输入事件处理：触发 renderProjects 重新过滤并渲染项目列表
        function filterProjects() {
            renderProjects();
        }

        // 批量删除已勾选项目的历史记录：先确认，再从 config.projects 和内存中移除，标记变更并刷新界面
        function deleteSelectedProjects() {
            const selected = projects.filter(p => p.selected);
            if (selected.length === 0) {
                alert('未选中项目');
                return;
            }

            if (!confirm(`确认删除 ${selected.length} 个项目的历史记录？`)) return;

            selected.forEach(project => {
                delete config.projects[project.path];
            });

            projects = projects.filter(p => !p.selected);
            markChanged();
            renderAllTabs();

            showMessage(`已删除 ${selected.length} 个项目。`, 'success');
        }

        // 导出单个项目的历史记录：请求后端 /api/project，将返回的 JSON 以 Blob 形式触发浏览器下载
        async function exportProjectHistory(path) {
            try {
                const response = await fetch(`/api/project?path=${encodeURIComponent(path)}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const blob = await response.blob();

                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                const projectName = path.split('/').pop() || 'project';
                a.href = url;
                a.download = `${projectName}-history.json`;
                a.click();
                window.URL.revokeObjectURL(url);

                showMessage(`已导出项目历史：${path}`, 'success');
            } catch (error) {
                showMessage('导出失败：' + error.message, 'error');
            }
        }

        // 删除 MCP 服务器：确认后从 config.mcpServers 中移除指定名称的服务器
        function deleteMcpServer(name) {
            if (!confirm(`确认删除 MCP 服务器 "${name}"？`)) return;

            delete config.mcpServers[name];
            markChanged();
            renderAllTabs();

            showMessage(`MCP 服务器 "${name}" 已删除。`, 'success');
        }

        // 添加 MCP 服务器：收集名称、命令、参数
        function addMcpServer() {
            const name = prompt('MCP 服务器名称：');
            if (!name) return;

            const command = prompt('命令（如 npx、node、uvx）：');
            if (!command) return;

            const argsStr = prompt('参数（空格分隔，如 -y package-name）：');
            const args = argsStr ? argsStr.trim().split(/\s+/) : undefined;

            if (!args && !confirm('未提供参数，确认添加仅命令的服务器？')) return;

            if (!config.mcpServers) config.mcpServers = {};
            if (config.mcpServers[name] && !confirm(`MCP 服务器 "${name}" 已存在，是否覆盖？`)) return;

            config.mcpServers[name] = {
                command: command,
                args: args
            };

            markChanged();
            renderAllTabs();
            showMessage(`MCP 服务器 "${name}" 已添加。`, 'success');
        }

        // 标记配置已变更：设置脏标记并激活保存按钮，文字也恢复为"💾 保存"
        function markChanged() {
            hasChanges = true;
            const btn = document.getElementById('save-btn');
            btn.disabled = false;
            btn.textContent = '💾 保存';
        }

        // 保存配置到磁盘：POST /api/save 将当前 config 写入 ~/.claude.json，后端自动备份。
        // 成功后清除脏标记、更新保存时间；失败则恢复按钮可用状态。
        async function saveConfig() {
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = '⏳ 保存中...';

            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const result = await response.json();

                if (result.success) {
                    hasChanges = false;
                    const now = new Date().toLocaleTimeString();
                    document.getElementById('last-save').textContent = now;
                    showMessage('✅ 配置已保存！重启 Claude Code 后生效。', 'success');
                    saveBtn.textContent = '💾 已保存';
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('保存失败：' + error.message, 'error');
                saveBtn.disabled = false;
                saveBtn.textContent = '💾 保存';
            }
        }

        // 重新加载页面：有未保存修改时 confirm 确认丢失，否则直接刷新
        function reloadConfig() {
            if (hasChanges && !confirm('未保存的更改将丢失，确定继续？')) {
                return;
            }
            location.reload();
        }

        // 创建本地备份：将当前 config 序列化为 JSON 文件，带时间戳触发浏览器下载
        function createBackup() {
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            a.href = url;
            a.download = `claude-config-backup-${timestamp}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showMessage('备份已创建并下载', 'success');
        }

        // 复制完整 JSON 到剪贴板：格式化序列化 config 对象，方便粘贴到其他工具
        function copyRawJson() {
            const text = JSON.stringify(config, null, 2);
            navigator.clipboard.writeText(text);
            showMessage('JSON 已复制到剪贴板', 'success');
        }

        // 显示提示消息：success 类型绿色，error 类型红色，自动 3 秒后消失
        function showMessage(text, type) {
            const messageArea = document.getElementById('message-area');
            const className = type === 'success' ? 'success-message' : 'warning';
            messageArea.innerHTML = `<div class="${className}">${text}</div>`;

            setTimeout(() => {
                messageArea.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
