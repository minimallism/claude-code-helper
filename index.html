<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code History Cleaner</title>
    <style>
        :root {
            --bg: #1e1f1c;
            --panel: #252622;
            --hover: #2e2f2a;
            --border: #3b3b35;
            --accent: #7ea700;
            --muted: #6b6b61;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: #c5c8c6;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        h2 {
            color: var(--accent);
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-path {
            background: var(--panel);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-family: Monaco, monospace;
            font-size: 12px;
            color: var(--muted);
        }

        .top-controls {
            background: var(--panel);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            padding: 12px 24px;
            background: var(--panel);
            border: none;
            color: var(--muted);
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s;
            font-size: 14px;
        }

        .tab:hover {
            background: var(--hover);
            color: #c5c8c6;
        }

        .tab.active {
            background: var(--bg);
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section {
            background: var(--panel);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .badge {
            background: #4fb8cc;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        button {
            background: #4fb8cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #3a93a4;
        }

        button:disabled {
            background: #3b3b35;
            cursor: not-allowed;
        }

        button.danger {
            background: #c4265e;
        }

        button.danger:hover:not(:disabled) {
            background: #a81f4e;
        }

        button.success {
            background: #7ea700;
        }

        button.success:hover:not(:disabled) {
            background: #6b8c00;
        }

        button.primary {
            background: #9955bb;
        }

        button.primary:hover:not(:disabled) {
            background: #81439c;
        }

        button.muted {
            background: #6b6b61;
        }

        button.muted:hover:not(:disabled) {
            background: #56564d;
        }

        button.warn {
            background: #cc7a31;
        }

        button.warn:hover:not(:disabled) {
            background: #b06624;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--hover);
        }

        th {
            text-align: left;
            padding: 12px;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: var(--hover);
            cursor: pointer;
        }

        tbody tr.selected {
            background: #2e2f2a;
        }

        td {
            padding: 12px;
            font-size: 14px;
        }

        .size-bar {
            height: 20px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .size-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7ea700, #4fb8cc);
            transition: width 0.3s;
        }

        .size-text {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-weight: bold;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #151613;
            border: 1px solid #3b3b35;
            color: #c5c8c6;
            border-radius: 4px;
            font-size: 14px;
        }

        .warning {
            background: #2e241a;
            border-left: 4px solid #cc7a31;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .success-message {
            background: #1e2a14;
            border-left: 4px solid #7ea700;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--hover);
            padding: 15px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Claude Code History Cleaner</h1>
        <p style="color: var(--muted); margin-bottom: 20px;">可视化项目空间占用 · 批量清理闲置历史</p>

        <div class="config-path">
            📄 配置文件: <span id="config-path">加载中...</span>
        </div>

        <div class="top-controls">
            <button class="success" onclick="saveConfig()" id="save-btn" disabled>💾 保存</button>
            <button onclick="reloadConfig()">🔄 刷新</button>
            <div style="flex: 1;"></div>
            <div style="color: var(--muted); font-size: 12px;">
                上次保存: <span id="last-save">暂无</span>
            </div>
        </div>

        <div id="message-area"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('overview')">📊 概览</button>
            <button class="tab" onclick="switchTab('projects')">📁 项目历史</button>
        </div>

        <!-- 概览标签页 -->
        <div id="tab-overview" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">项目数量</div>
                    <div class="stat-value" id="overview-projects">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">项目总磁盘占用</div>
                    <div class="stat-value" id="overview-disk">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">配置大小</div>
                    <div class="stat-value" id="overview-size">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">闲置项目 (&gt;10 天)</div>
                    <div class="stat-value" id="overview-idle">-</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2>🔍 快速分析</h2>
                </div>
                <div id="quick-analysis"></div>
            </div>
        </div>

        <!-- 项目标签页 -->
        <div id="tab-projects" class="tab-content">
            <div class="section">
                <div class="section-header">
                    <h2>📁 项目历史 <span class="badge" id="projects-badge">0</span></h2>
                    <div>
                        <button class="primary" onclick="selectAllProjects()">全选</button>
                        <button class="muted" onclick="deselectAllProjects()">取消全选</button>
                        <button class="warn" onclick="selectLargestProjects()">最大的 10 个</button>
                        <button class="danger" onclick="deleteSelectedProjects()">删除选中</button>
                    </div>
                </div>
                <div class="search-box" style="margin-bottom: 15px;">
                    <input type="text" id="projects-search" placeholder="搜索项目..." onkeyup="filterProjects()">
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 50px;">
                                    <input type="checkbox" id="select-all-projects" onchange="toggleAllProjects(this.checked)">
                                </th>
                                <th onclick="sortProjects('path')">项目路径 ↕</th>
                                <th style="width: 200px;" onclick="sortProjects('lastStartTime')">最近启动 ↕</th>
                                <th style="width: 300px;" onclick="sortProjects('size')">大小 ↕</th>
                            </tr>
                        </thead>
                        <tbody id="projects-body">
                            <tr><td colspan="4" class="no-data">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        let config = null;
        let projectSizes = {};
        let projects = [];
        let sortColumn = 'size';
        let sortDirection = 'desc';
        let hasChanges = false;
        let messageTimer = null;

        loadConfig();

        // 从服务器获取完整的 Claude Code 配置文件（含项目列表、磁盘大小等），解析后渲染所有页签
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();

                if (!response.ok || !data.config) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }

                document.getElementById('config-path').textContent = data.path;
                config = data.config;
                projectSizes = data.project_sizes;

                processConfig();
                renderAllTabs();
            } catch (error) {
                showMessage('配置加载失败：' + error.message, 'error');
            }
        }

        // 解析配置中的项目列表，提取每个项目的路径、最近启动时间等信息
        // 项目大小仅取 projectSizes（即磁盘缓存目录大小），不包含 JSON 元数据
        function processConfig() {
            projects = [];

            if (config.projects) {
                for (const [path, data] of Object.entries(config.projects)) {
                    projects.push({
                        path: path,
                        data: data,
                        lastStartTime: data.lastStartTime || 0,
                        size: (projectSizes[path] || 0),
                        selected: false
                    });
                }
            }
        }

        // 刷新所有页签：概览、项目列表
        function renderAllTabs() {
            renderOverview();
            renderProjects();
        }

        // 渲染概览页签：统计项目数量、磁盘占用、配置 JSON 大小、闲置项目数、健康分析
        function renderOverview() {
            const totalSize = JSON.stringify(config, null, 2).length;
            const projectsCount = projects.length;
            const now = Date.now();
            const DAY_10 = 10 * 24 * 60 * 60 * 1000;

            // 总磁盘占用（projectSizes 中各项目目录实际大小之和）
            const totalDisk = Object.values(projectSizes).reduce((a, b) => a + b, 0);

            // 闲置项目：lastStartTime 为 0 或超过 10 天
            const idleCount = projects.filter(p => !p.lastStartTime || now - p.lastStartTime > DAY_10).length;

            document.getElementById('overview-projects').textContent = projectsCount;
            document.getElementById('overview-disk').textContent = formatSize(totalDisk);
            document.getElementById('overview-size').textContent = formatSize(totalSize);
            document.getElementById('overview-idle').textContent = idleCount;

            // --- 快速分析 ---
            let analysis = '';

            // 配置过大
            if (totalSize > 3 * 1024 * 1024) {
                analysis += '⚠️ 配置过大 (' + formatSize(totalSize) + ')。建议清理旧的项目历史记录。<br><br>';
            }

            // 闲置项目过多
            if (idleCount > 5) {
                analysis += '💤 ' + idleCount + ' 个项目超过 10 天未活跃。建议在项目历史页清理。<br><br>';
            }

            // 微型项目过多：项目历史 < 500KB 无保留价值
            const tinyCount = projects.filter(p => p.size < 500 * 1000).length;
            if (tinyCount > 5) {
                analysis += '🤏 ' + tinyCount + ' 个微型项目 (&lt;500KB)，几乎没有历史记录可一并清理。<br><br>';
            }

            // 项目过多
            if (projectsCount > 10) {
                analysis += '📋 ' + projectsCount + ' 个项目，建议清理不活跃的项目减少配置膨胀。<br><br>';
            }

            // 健康
            if (totalSize <= 3 * 1024 * 1024 && idleCount <= 5 && tinyCount <= 5 && projectsCount <= 10) {
                analysis = '<div style="color: #7ea700;">✅ 配置状态健康！</div>' + analysis;
            }

            document.getElementById('quick-analysis').innerHTML = '<div style="color: var(--muted);">' + analysis + '</div>';
        }

        // 渲染项目列表：搜索过滤、排序、比例条形图
        function renderProjects() {
            const tbody = document.getElementById('projects-body');
            const searchTerm = document.getElementById('projects-search').value.toLowerCase();

            document.getElementById('projects-badge').textContent = projects.length;

            if (projects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="no-data">暂无项目</td></tr>';
                return;
            }

            const compare = {
                'path': (a, b) => a.path.localeCompare(b.path),
                'lastStartTime': (a, b) => a.lastStartTime - b.lastStartTime,
                'size': (a, b) => a.size - b.size
            };

            const sorted = [...projects].sort((a, b) => {
                const result = compare[sortColumn](a, b);
                return sortDirection === 'asc' ? result : -result;
            });
           
            const filtered = searchTerm
                ? sorted.filter(p => p.path.toLowerCase().includes(searchTerm))
                : sorted;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="no-data">无匹配项目</td></tr>';
                document.getElementById('select-all-projects').checked = false;
                return;
            }

            const maxSize = Math.max(...filtered.map(p => p.size));

            tbody.innerHTML = filtered.map(project => {
                const percentage = maxSize > 0 ? (project.size / maxSize) * 100 : 0;

                return `
                    <tr class="${project.selected ? 'selected' : ''}">
                        <td>
                            <input type="checkbox" ${project.selected ? 'checked' : ''}>
                        </td>
                        <td style="font-family: 'Monaco', monospace;">
                            ${project.path}
                        </td>
                        <td style="color: var(--muted);">
                            ${project.lastStartTime ? new Date(project.lastStartTime).toLocaleString() : '-'}
                        </td>
                        <td>
                            <div class="size-bar">
                                <div class="size-bar-fill" style="width: ${percentage}%"></div>
                                <span class="size-text">${formatSize(project.size)}</span>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            // 用 addEventListener 绑定事件，直接通过闭包传路径，不需要任何转义
            tbody.querySelectorAll('tr').forEach((tr, index) => {
                const path = filtered[index].path;
                tr.addEventListener('click', () => toggleProject(path));
                tr.querySelector('input[type="checkbox"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleProject(path);
                });
            });

            // 同步全选 checkbox 状态：如果当前过滤结果全部选中，则勾选；否则取消
            const allSelected = filtered.every(p => p.selected);
            document.getElementById('select-all-projects').checked = allSelected;
        }

        // 字节数转可读格式：采用十进制单位 (1 KB = 1000 B, 1 MB = 1000 KB, 1 GB = 1000 MB)
        function formatSize(bytes) {
            if (bytes < 1000) {
                return bytes + ' B';
            }
            if (bytes < 1000 * 1000) {
                return (bytes / 1000).toFixed(1) + ' KB';
            }
            if (bytes < 1000 * 1000 * 1000) {
                return (bytes / 1000 / 1000).toFixed(2) + ' MB';
            }
            return (bytes / 1000 / 1000 / 1000).toFixed(2) + ' GB';
        }

        // 切换标签页：取消所有 tab/tab-content 的 active，再激活当前选中的
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        // 切换项目选中状态（勾选/取消勾选），用于批量删除
        function toggleProject(path) {
            const project = projects.find(p => p.path === path);
            if (project) {
                project.selected = !project.selected;
                renderProjects();
            }
        }

        // 获取当前搜索过滤后的项目列表
        function getFilteredProjects() {
            const s = document.getElementById('projects-search').value.toLowerCase();
            return s ? projects.filter(p => p.path.toLowerCase().includes(s)) : projects;
        }

        // 全选/取消全选：仅操作当前搜索过滤后的项目列表
        function toggleAllProjects(checked) {
            getFilteredProjects().forEach(p => p.selected = checked);
            renderProjects();
        }

        // 全选：同步"全选"checkbox 为勾选状态，再批量选中所有项目
        function selectAllProjects() {
            document.getElementById('select-all-projects').checked = true;
            toggleAllProjects(true);
        }

        // 取消全选：同步"全选"checkbox 为未勾选，再批量取消所有项目
        function deselectAllProjects() {
            document.getElementById('select-all-projects').checked = false;
            toggleAllProjects(false);
        }

        // 快速选中体积最大的前 10 个项目（按 size 降序），方便批量清理
        function selectLargestProjects() {
            deselectAllProjects();
            [...getFilteredProjects()].sort((a, b) => b.size - a.size)
                .slice(0, 10).forEach(p => p.selected = true);
            renderProjects();
        }

        // 表头点击排序：同列翻转，不同列默认降序
        function sortProjects(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'desc';
            }
            renderProjects();
        }

        // 搜索框输入事件处理：触发 renderProjects 重新过滤并渲染项目列表
        function filterProjects() {
            renderProjects();
        }

        // 批量删除已勾选项目的历史记录：先确认，再从 config.projects 和内存中移除，标记变更并刷新界面
        function deleteSelectedProjects() {
            const selected = projects.filter(p => p.selected);
            if (selected.length === 0) {
                alert('未选中项目');
                return;
            }

            if (!confirm(`确认删除 ${selected.length} 个项目的历史记录？`)) return;

            selected.forEach(project => {
                delete config.projects[project.path];
                delete projectSizes[project.path];
            });

            projects = projects.filter(p => !p.selected);
            markChanged();
            renderAllTabs();

            showMessage(`已删除 ${selected.length} 个项目。`, 'success');
        }

        // 标记配置已变更：设置脏标记并激活保存按钮，文字也恢复为"💾 保存"
        function markChanged() {
            hasChanges = true;
            const btn = document.getElementById('save-btn');
            btn.disabled = false;
            btn.textContent = '💾 保存';
        }

        // 保存配置到磁盘：POST /api/save 将当前 config 写入 ~/.claude.json。
        // 成功后清除脏标记、更新保存时间；失败则恢复按钮可用状态。
        async function saveConfig() {
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = '⏳ 保存中...';

            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const result = await response.json();

                if (result.success) {
                    hasChanges = false;
                    const now = new Date().toLocaleTimeString();
                    document.getElementById('last-save').textContent = now;
                    showMessage('✅ 配置已保存！重启 Claude Code 后生效。', 'success');
                    saveBtn.textContent = '💾 已保存';
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('保存失败：' + error.message, 'error');
                saveBtn.disabled = false;
                saveBtn.textContent = '💾 保存';
            }
        }

        // 重新加载页面：有未保存修改时 confirm 确认丢失，否则直接刷新
        function reloadConfig() {
            if (hasChanges && !confirm('未保存的更改将丢失，确定继续？')) {
                return;
            }
            location.reload();
        }

        // 显示提示消息：success 类型绿色，非 success 类型橙色，自动 5 秒后消失
        function showMessage(text, type) {
            const messageArea = document.getElementById('message-area');
            const className = type === 'success' ? 'success-message' : 'warning';
            
            clearTimeout(messageTimer);
            messageArea.innerHTML = `<div class="${className}">${text}</div>`;

            messageTimer = setTimeout(() => {
                messageArea.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
